# Auto Loot PoE Helper — базовый конфиг (можно переопределить профилем)

game:
  window_title: "Path of Exile 2"
  monitor: 0            # индекс монитора (0 = основной; -1 = определить по окну)

capture:
  backend: dxcam        # dxcam | mss (dxcam быстрее; при сбое авто-фолбэк на mss)
  target_fps: 30
  double_buffer: true   # фоновый захват кадров (сглаживает тайминг)

filter:
  path: "C:/Users/OLD/Documents/My Games/Path of Exile 2/Vladislav Yoshi Perfection.filter"
  marker_rgb: [255, 0, 200]    # fallback-цвет маркера (для категорий без своего цвета)
  extra_colors: []              # доп. цвета для детекции (R, G, B)
  category_colors:              # все категории — один безопасный розовый (нет в окружении PoE2)
    currency:  [255, 0, 200]
    fragments: [255, 0, 200]
    waystones: [255, 0, 200]
    gems:      [255, 0, 200]
  categories:                   # какие категории авто-собирать
    - currency
    - fragments
    - waystones
    - gems

vision:
  min_blob_area: 120    # мин. площадь пятна маркера в пикселях (одна подпись большая)
  hue_tolerance: 8      # допуск по тону вокруг marker_rgb (HSV, 0..179)
  sat_min: 120          # мин. насыщенность
  val_min: 120          # мин. яркость
  close_px: 3           # лёгкая склейка (плотные подписи; большая склеивает соседние)
  auto_calibrate: false # авто-определение цветов фильтра при старте

loot:
  pickup_radius_px: 250  # только близкий лут (большой радиус -> беготня к дальнему)
  lazy_radius_px: 80     # радиус подбора вокруг КУРСОРА в режиме lazy
  roi_margin_px: 100     # допуск вокруг радиуса для захвата ROI (захват чуть больше радиуса)
  click_cooldown_ms: 100 # пауза между кликами (мало -> мельтешение, не успевает поднять)
  dedup_ms: 2500         # 0 = прилипание к ближайшей цели; >0 = не кликать ту же точку N мс
  dedup_px: 24           # допуск расстояния для анти-дабл-клика (пиксели)
  stuck_timeout_s: 5.0   # анти-стак: пропустить цель если кликаем по ней дольше N секунд
  randomize_delay_ms: [5, 15]
  human_mouse: true         # плавное движение по кривой Безье (выглядит как рука человека)
  mode: toggle          # hold | toggle | single | lazy (toggle: F8 вкл/выкл, ничего не держать)
  category_priority:    # порядок подбора (меньше = важнее; сначала валюта, потом остальное)
    currency: 1
    fragments: 2
    gems: 3
    waystones: 4
  center_offset_xy: [0, -40]  # центр персонажа относительно центра кадра

hotkeys:
  toggle: "f8"        # мастер вкл/выкл (toggle-режим подбора + авто-автоматика)
  pickup: "space"
  profile: "f7"       # циклическое переключение профилей на лету
  reload: "f5"        # перезагрузить конфиг
  settings: "f6"      # открыть GUI настроек
  calibrate: "f9"
  quit: "f12"
  category_hotkeys:   # клавиши для быстрого включения/выключения категорий
    currency: "1"     # зажми 1 = подбирать только валюту
    fragments: "2"    # зажми 2 = подбирать только фрагменты
    gems: "3"         # зажми 3 = подбирать только гемы
    waystones: "4"    # зажми 4 = подбирать только вейстоуны

profiles:
  start: null         # имя профиля при старте (без .yaml); null = default

hp_flask:             # авто-фласка ХП при просадке жизней
  enabled: true       # включить: true
  key: "1"            # клавиша фласки жизни
  threshold: 0.65     # нажать когда ХП < 65%
  cooldown_ms: 4500   # пауза между нажатиями (не спамить)
  sound: true         # звуковой сигнал при нажатии фласки
  hp_region:          # регион орба ХП (доли от размера окна, 0..1)
    x: 0.01           # левый край
    y: 0.84           # верхний край
    w: 0.10           # ширина
    h: 0.15           # высота

automation:           # авто-фласки/скиллы по таймеру (по умолчанию ВЫКЛ)
  enabled: false
  only_when_foreground: true
  actions:
    - {name: life_flask, key: "1", interval_ms: 5000, enabled: true}
    - {name: mana_flask, key: "2", interval_ms: 6000, enabled: true}

loot_eval:            # оценка лута (правила или LLM)
  llm_enabled: false  # включить LLM-оценку (требует API ключ)
  llm_api_key: null   # OpenAI API ключ (или совместимый)
  llm_model: "gpt-4o-mini"  # модель для оценки
  llm_base_url: null  # кастомный base_url (для совместимых API)

telegram:             # уведомления о редких дропах
  enabled: false
  bot_token: null     # токен Telegram бота (от @BotFather)
  chat_id: null       # ID чата для уведомлений

overlay:
  enabled: true
  show_radius: true
  poll_ms: 120
  tray_icon: true          # системный трей-икон (требуется pystray + Pillow)

logging:
  level: INFO
  csv_pickup: true        # логировать каждый подбор в CSV (_debug/pickup_log_*.csv)
